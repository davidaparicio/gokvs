name: "Security Scan (gosec)"

# Run workflow each time code is pushed to your repository and on a schedule.
# The scheduled workflow runs every at 10:13 on Thursday UTC time.
# https://crontab.guru/#13_10_*_*_4
on:
  schedule:
    - cron: '13 10 * * 4'
  workflow_call:

permissions:
  contents: read

jobs:
  analyze:
    name: Analyze gosec
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    env:
      GO111MODULE: on
    
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - name: Checkout Source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Run Gosec Security Scanner
        uses: securego/gosec@9e6a9843d7a4a6e3e9a8539b02612c8a4aa3f889 # v2.27.1
        with:
          # we let the report trigger content trigger a failure using the GitHub Security features.
          args: '-no-fail -fmt sarif -out results.sarif ./...'
      - name: Fix SARIF relationships
        run: |
          jq 'if .runs[0].tool.driver.rules then 
                .runs[0].tool.driver.rules |= map(if .relationships then (.relationships |= []) else . end)
              else . end' results.sarif > results.fixed.sarif && mv results.fixed.sarif results.sarif
      - name: Upload SARIF file
        uses: github/codeql-action/upload-sarif@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4.37.0
        with:
          # Path to SARIF file relative to the root of the repository
          sarif_file: results.sarif
        #https://github.com/analysis-tools-dev/static-analysis#go