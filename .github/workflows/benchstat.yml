# This workflow runs benchmarks against the current branch, compares them to benchmarks against
# main, and uploads the results as an artifact. Unlike in the Validate workflow we only test these
# benchmarks against the latest versions of Go and the Runner.

name: Benchstat

on:
  workflow_call:

permissions:
  pull-requests: write

env:
  BENCH_COUNT: 10

jobs:
  benchstat:
    runs-on: ubuntu-latest
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - name: Checkout incoming branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version: stable
      - name: Install benchstat
        run: go install golang.org/x/perf/cmd/benchstat@latest
      - name: Benchmark incoming branch
        run: go test -run=XXX -bench=. -benchmem -count=${{ env.BENCH_COUNT }} ./... | tee bench-incoming.txt
      - name: Checkout baseline (main)
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: main
          clean: false
      - name: Benchmark baseline (main)
        run: go test -run=XXX -bench=. -benchmem -count=${{ env.BENCH_COUNT }} ./... | tee bench-baseline.txt
      - name: Benchstat Results
        run: |
          benchstat bench-baseline.txt bench-incoming.txt | tee benchstat.txt
          python3 .github/scripts/benchstat_to_markdown.py benchstat.txt benchstat.md
          cat benchstat.md >> $GITHUB_STEP_SUMMARY
      - name: Comment PR with benchmark results
        if: github.event_name == 'pull_request'
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const fs = require('fs');
            const md = fs.readFileSync('benchstat.md', 'utf8')
              + '<details><summary>ℹ️ About</summary>\n\nBenchmarks ran with `-count=${{ env.BENCH_COUNT }}`. Statistically significant changes (p < 0.05) are marked by benchstat.\n</details>';
            const marker = '## Benchmark Results';
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body: md,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: md,
              });
            }
      - name: Upload benchmark results
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: benchstat
          path: |
            bench-incoming.txt
            bench-baseline.txt
            benchstat.txt
