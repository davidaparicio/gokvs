# This workflow runs benchmarks against the current branch, compares them to benchmarks against
# main, and uploads the results as an artifact. Unlike in the Validate workflow we only test these
# benchmarks against the latest versions of Go and the Runner.

name: Benchstat

on:
  workflow_call:

permissions:
  pull-requests: write

env:
  BENCH_COUNT: 10

jobs:
  benchstat:
    runs-on: ubuntu-latest
    steps:
      - name: Install Go
        uses: actions/setup-go@v6
        with:
          go-version: stable
      - name: Checkout incoming branch
        uses: actions/checkout@v6
      - name: Install benchstat
        run: go install golang.org/x/perf/cmd/benchstat@latest
      - name: Benchmark incoming branch
        run: go test -run=XXX -bench=. -benchmem -count=${{ env.BENCH_COUNT }} ./... | tee bench-incoming.txt
      - name: Checkout baseline (main)
        uses: actions/checkout@v6
        with:
          ref: main
          clean: false
      - name: Benchmark baseline (main)
        run: go test -run=XXX -bench=. -benchmem -count=${{ env.BENCH_COUNT }} ./... | tee bench-baseline.txt
      - name: Benchstat Results
        run: |
          benchstat bench-baseline.txt bench-incoming.txt | tee benchstat.txt
          echo '## Benchstat Results' >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat benchstat.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
      - name: Comment PR with benchmark results
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const text = fs.readFileSync('benchstat.txt', 'utf8');
            const lines = text.split('\n');

            const metaLines = [];
            const sections = [];
            let current = null;

            for (const line of lines) {
              if (line.trim() === '') {
                if (current) { sections.push(current); current = null; }
                continue;
              }
              if (line.includes('│')) {
                if (!current) current = { pipes: [], data: [], notes: [] };
                current.pipes.push(line);
              } else if (current) {
                if (/^[¹²³⁴⁵]/.test(line.trim())) current.notes.push(line.trim());
                else current.data.push(line);
              } else {
                metaLines.push(line.trim());
              }
            }
            if (current) sections.push(current);

            function parseRow(line) {
              return line.trim().split(/\s{2,}/).filter(Boolean);
            }

            let md = '## Benchmark Results\n\n';
            if (metaLines.length > 0) {
              md += metaLines.map(l => '> ' + l).join('\n') + '\n\n';
            }

            for (const s of sections) {
              if (s.pipes.length < 2) continue;
              const metric = s.pipes[1].split('│').map(p => p.trim()).filter(Boolean)[0];
              md += '#### ' + metric + '\n\n';
              md += '| Benchmark | Baseline | Incoming | Delta |\n';
              md += '|:----------|:--------:|:--------:|:-----:|\n';
              for (const row of s.data) {
                const parts = parseRow(row);
                if (parts.length === 0) continue;
                const [name, baseline = '', incoming = '', delta = ''] = parts;
                const b = name === 'geomean' ? v => '**' + v + '**' : v => v;
                md += '| ' + b(name) + ' | ' + b(baseline) + ' | ' + b(incoming) + ' | ' + b(delta) + ' |\n';
              }
              md += '\n';
              if (s.notes.length > 0) {
                md += s.notes.map(n => '_' + n + '_').join('  \n') + '\n\n';
              }
            }

            md += '<details><summary>ℹ️ About</summary>\n\nBenchmarks ran with `-count=${{ env.BENCH_COUNT }}`. Statistically significant changes (p < 0.05) are marked by benchstat.\n</details>';

            const marker = '## Benchmark Results';
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body: md,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: md,
              });
            }
      - name: Upload benchmark results
        uses: actions/upload-artifact@v7
        with:
          name: benchstat
          path: |
            bench-incoming.txt
            bench-baseline.txt
            benchstat.txt
