sonar.projectKey=davidaparicio_gokvs
sonar.organization=davidaparicio

# Generated protobuf/gateway code and vendored protos are not hand-written:
# keep them out of analysis, duplication detection, and coverage metrics.
sonar.exclusions=api/**/*.pb.go,api/**/*.pb.gw.go,third_party/**
sonar.cpd.exclusions=api/**
sonar.coverage.exclusions=api/**,cmd/grpc/**,cmd/grpcclient/**,examples/**,scripts/**

# Coverage report produced by the sonar-analysis workflow before the scan.
sonar.go.coverage.reportPaths=cover.out