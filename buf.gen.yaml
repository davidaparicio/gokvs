version: v2
clean: false
plugins:
  - local: protoc-gen-go
    out: .
    opt: module=github.com/davidaparicio/gokvs
  - local: protoc-gen-go-grpc
    out: .
    opt: module=github.com/davidaparicio/gokvs
  - local: protoc-gen-grpc-gateway
    out: .
    opt: module=github.com/davidaparicio/gokvs
  - local: protoc-gen-openapiv2
    out: api
